<!DOCTYPE html>
<html>
<head>
  <title>Menu Digital</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.0/css/all.css">
 <link rel="stylesheet" href="https://menudigitalinterativo.github.io/sistema-cardapio/style.css">
</head>
<body>
  <div id="loading-overlay">
    <img id="loader-logo-img" class="loader-logo" src="" style="display:none;">
    <div class="progress-container"><div class="progress-bar" id="main-progress-bar"></div></div>
    <p style="margin-top:10px; color:#888; font-size: 0.8em;">Carregando...</p>
  </div>
  <div id="toast-container"></div>
  <div class="fixed-top-container">
    <header class="top-header">
      <div class="header-left">
        <img id="company-logo" class="logo" style="display: none;" alt="Logo">
        <div class="header-texts">
          <span id="company-name" class="company-name"></span>
        </div>
      </div>
      <div class="header-right" onclick="abrirHorarios()" style="cursor:pointer;">
        <span id="status-indicator" class="status-dot"></span>
        <div class="status-text">
          <span id="status-text">Aberto</span>
          <small>Hoje</small>
        </div>
      </div>
    </header>
    <div class="search-container">
      <i class="fas fa-search" style="color: #ccc;"></i>
      <input type="text" id="search-input" placeholder="Buscar no cardápio...">
    </div>
  </div>
  <div class="container">
    <div id="menu-content"></div>
  </div>
  <div id="cart-float">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count">0</span>
  </div>
  <div id="cart-modal">
    <div class="cart-modal-content">
      <div class="drag-handle"></div>
      <div class="cart-header"><span>Meu Pedido</span><span id="close-cart">&times;</span></div>
      <div class="cart-body">
        <label>Seu Nome</label>
        <input id="client-name" type="text" placeholder="Digite seu nome">
        <label>Tipo de Entrega</label>
<select id="tipo-entrega">
  <option value="">Selecione</option>
  <option value="retirada">Retirada no local</option>
  <option value="delivery">Delivery</option>
</select>

<div id="box-bairro" style="display:none; margin-top:10px;">
  <label>Bairro</label>
  <select id="select-bairro"></select>
</div>
        <div id="cart-items"></div>
      </div>
      <div class="cart-footer">
      <!-- 🔥 TOTAL DO CARRINHO -->
  <div style="margin-bottom:10px; font-size:0.9em;">
    <div>Subtotal: <span id="subtotal-carrinho">R$ 0,00</span></div>
    <div>Taxa: <span id="taxa-entrega-display">R$ 0,00</span></div>
    <div><strong>Total: <span id="total-geral">R$ 0,00</span></strong></div>
  </div>

  <button class="add-to-cart-btn" onclick="finalizarPedido()">
    Finalizar no WhatsApp
  </button>
      </div>
    </div>
  </div>
<script src="https://menudigitalinterativo.github.io/sistema-cardapio/script.js"></script>
<script>iniciarCardapio('./dados/cardapio.json');</script>
<div id="modal-horarios" class="modal">
  <div class="modal-content horarios-box">

    <span class="close-btn" onclick="fecharHorarios()">✖</span>

    <h2>Horários de Funcionamento</h2>

    <div class="hora-atual">
      <div>⏺ Horário Atual</div>
      <div id="relogio" class="relogio"></div>
      <div id="data-atual" class="data-atual"></div>
    </div>
    <div id="horarios-container"></div>
  </div>
</div>  

<footer id="site-footer">
  <div class="footer-line"></div>

  <div class="footer-content">
    <h3 id="footer-name"></h3>
    <p id="footer-address"></p>
    <p id="footer-phone"></p>

    <div class="footer-social">
      <a id="footer-instagram" target="_blank">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a id="footer-facebook" target="_blank">
        <i class="fa-brands fa-facebook"></i>
      </a>

      <a id="footer-whatsapp" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
    </div>
  </div>
</footer>
</body>
</html>
